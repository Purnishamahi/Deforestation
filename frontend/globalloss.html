<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Global Forest Loss</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f4f6f5;
}

/* HEADER */

header{
background:#1b4332;
color:white;
padding:18px 60px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav a{
color:white;
text-decoration:none;
margin-left:30px;
}

/* PAGE */

.container{
padding:60px;
text-align:center;
}

h1{
color:#1b4332;
margin-bottom:40px;
}

h2{
margin-bottom:25px;
}

/* GLOBAL GRAPH */

.global-chart{
width:1100px;
height:500px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
margin-bottom:70px;
}

/* SEARCH */

.search-box{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:40px;
}

input{
padding:12px;
font-size:16px;
width:260px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:12px 18px;
background:#2d6a4f;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1b4332;
}

/* COUNTRY GRAPH */

.chart-box{
width:1000px;
height:450px;
margin:0 auto 60px auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

/* TABLE */

.table-box{
width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#2d6a4f;
color:white;
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid #eee;
}

tr:hover{
background:#f3f7f5;
}

</style>

</head>


<body>


<header>

<h2>🌍 Forest Loss Analytics</h2>

<nav>

<a href="home.html">Home</a>
<a href="globalloss.html">Global Loss</a>
<a href="globalemission.html">Global CO₂</a>
<a href="globalfireloss.html">Global Fire Loss</a>

</nav>

</header>



<div class="container">

<h1>Global Forest Loss Analysis</h1>


<!-- GLOBAL GRAPH -->

<div class="global-chart">

<h2>Global Forest Loss by Year</h2>

<canvas id="globalChart"></canvas>

</div>



<!-- COUNTRY SEARCH -->

<h2>Country Level Forest Loss</h2>

<div class="search-box">

<input type="text" id="countryInput" placeholder="Enter country name">

<button onclick="loadCountry()">Search</button>

</div>



<!-- COUNTRY GRAPH -->

<div class="chart-box">

<canvas id="countryChart"></canvas>

</div>



<!-- TABLE -->

<div class="table-box">

<table>

<thead>

<tr>
<th>Year</th>
<th>Forest Loss (ha)</th>
</tr>

</thead>

<tbody id="dataTable"></tbody>

</table>

</div>


</div>



<script>

let countryChart;


/* GLOBAL GRAPH */

fetch("http://localhost:3000/global-loss-yearly")

.then(res=>res.json())

.then(data=>{

let years=data.map(d=>d.year);
let loss=data.map(d=>d.loss);

new Chart(

document.getElementById("globalChart"),

{
type:"bar",

data:{

labels:years,

datasets:[{

label:"Global Forest Loss",

data:loss,

backgroundColor:"#52b788"

}]

},

options:{

responsive:true,
maintainAspectRatio:false,

scales:{

x:{
title:{
display:true,
text:"Year"
}
},

y:{
title:{
display:true,
text:"Forest Loss"
},
beginAtZero:true
}

}

}

}

);

});


/* COUNTRY DATA */

function loadCountry(){

let country=document.getElementById("countryInput").value;

if(!country) return;

fetch(`http://localhost:3000/country-loss/${country}`)

.then(res=>res.json())

.then(data=>{

updateCountryChart(data);
updateTable(data);

})

.catch(()=>{

alert("Country not found");

});

}


/* COUNTRY GRAPH */

function updateCountryChart(data){

let years=data.map(d=>d.year);
let loss=data.map(d=>d.loss);

if(countryChart) countryChart.destroy();

countryChart=new Chart(

document.getElementById("countryChart"),

{
type:"bar",

data:{

labels:years,

datasets:[{

label:"Forest Loss",

data:loss,

backgroundColor:"#40916c"

}]

},

options:{

responsive:true,
maintainAspectRatio:false,

scales:{

x:{
title:{
display:true,
text:"Year"
}
},

y:{
title:{
display:true,
text:"Forest Loss"
},
beginAtZero:true
}

}

}

}

);

}


/* TABLE */

function updateTable(data){

let table=document.getElementById("dataTable");

table.innerHTML="";

data.forEach(row=>{

let tr=document.createElement("tr");

tr.innerHTML=`
<td>${row.year}</td>
<td>${row.loss}</td>
`;

table.appendChild(tr);

});

}

</script>


</body>
</html>
